name: Deploy Next.js site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: project/package-lock.json
      - uses: actions/configure-pages@v5
        with:
          static_site_generator: next
      - uses: actions/cache@v4
        with:
          path: project/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('project/package-lock.json') }}-${{ hashFiles('project/**.[jt]s', 'project/**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('project/package-lock.json') }}-
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /gift-landing-page
      - uses: actions/upload-pages-artifact@v3
        with:
          path: project/out

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
